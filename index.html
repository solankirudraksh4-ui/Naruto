<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naruto Hand Powers</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

<style>
body{
margin:0;
overflow:hidden;
background:black;
}

#v_src,#out{
position:absolute;
top:0;
left:0;
width:100vw;
height:100vh;
object-fit:cover;
transform:scaleX(-1);
}

#out{
z-index:2;
pointer-events:none;
}

.fx{
position:absolute;
transform:translate(-50%,-50%);
pointer-events:none;
display:none;
z-index:20;
}

#n{width:55vw;}
#s{width:65vw;}
</style>
</head>

<body>

<video id="v_src" autoplay playsinline></video>
<canvas id="out"></canvas>

<video id="n" class="fx" src="assets/naruto.mp4" muted playsinline loop></video>
<video id="s" class="fx" src="assets/sasuke.mp4" muted playsinline loop></video>

<script>

const video=document.getElementById("v_src");
const canvas=document.getElementById("out");
const ctx=canvas.getContext("2d");

const naruto=document.getElementById("n");
const sasuke=document.getElementById("s");

let power=[0,0];
let wasOpen=[false,false];

function isHandOpen(pts){

let count=0;
const wrist=pts[0];

const tips=[8,12,16,20];
const pips=[6,10,14,18];

for(let i=0;i<tips.length;i++){

const tip=pts[tips[i]];
const pip=pts[pips[i]];

if(Math.hypot(tip.x-wrist.x,tip.y-wrist.y) >
Math.hypot(pip.x-wrist.x,pip.y-wrist.y))
count++;

}

return count>=3;

}

function onResults(res){

canvas.width=video.videoWidth;
canvas.height=video.videoHeight;

ctx.clearRect(0,0,canvas.width,canvas.height);

naruto.style.display="none";
sasuke.style.display="none";

if(res.multiHandLandmarks){

res.multiHandLandmarks.forEach((pts,i)=>{

const label=res.multiHandedness[i].label;
const isRight=label==="Right";
const idx=isRight?1:0;

drawConnectors(ctx,pts,HAND_CONNECTIONS,{color:"#00d4ff",lineWidth:3});
drawLandmarks(ctx,pts,{color:"#ffffff",radius:2});

const open=isHandOpen(pts);

power[idx]+=open?0.05:-0.1;
power[idx]=Math.max(0,Math.min(1,power[idx]));

if(open&&!wasOpen[idx]){

const vid=isRight?sasuke:naruto;

vid.currentTime=0;
vid.muted=true;

vid.play().catch(()=>{});

}

wasOpen[idx]=open;

const wrist=pts[0];

if(power[idx]>0.05){

const x=(1-wrist.x)*window.innerWidth;
const y=wrist.y*window.innerHeight;

const vid=isRight?sasuke:naruto;

vid.style.left=x+"px";
vid.style.top=y+"px";

vid.style.opacity=power[idx];
vid.style.display="block";

}

});

}

}

const hands=new Hands({
locateFile:(file)=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
maxNumHands:2,
modelComplexity:1,
minDetectionConfidence:0.7,
minTrackingConfidence:0.7
});

hands.onResults(onResults);

const camera=new Camera(video,{
onFrame:async()=>{
await hands.send({image:video});
},
width:640,
height:480
});

camera.start();

</script>

</body>
</html>
