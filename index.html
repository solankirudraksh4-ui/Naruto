<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naruto Hand Powers</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:sans-serif;
}

/* camera and canvas */

#v_src,#out{
position:absolute;
top:0;
left:0;
width:100vw;
height:100vh;
object-fit:cover;
transform:scaleX(-1);
}

#out{
z-index:2;
pointer-events:none;
}

/* visual atmosphere */

.darkness{
position:absolute;
top:0;
left:0;
width:100vw;
height:100vh;
background:rgba(0,0,0,0.35);
pointer-events:none;
z-index:5;
}

/* chakra effects */

.fx{
position:absolute;
top:0;
left:0;
transform:translate(-50%,-50%);
pointer-events:none;
display:none;
z-index:20;

/* removes black background */
mix-blend-mode:screen;

/* smoother glow */
filter:brightness(1.6) contrast(1.3) saturate(1.2);

/* smoother rendering */
image-rendering:auto;
}

/* mobile friendly size */

#n{
width:55vw;
max-width:700px;
}

#s{
width:60vw;
max-width:750px;
}

</style>
</head>

<body>

<video id="v_src" autoplay playsinline muted></video>
<canvas id="out"></canvas>
<div class="darkness"></div>

<!-- effects -->

<video id="n" class="fx" src="assets/naruto.mp4" muted playsinline loop></video>
<video id="s" class="fx" src="assets/sasuke.mp4" muted playsinline loop></video>

<script>

const video=document.getElementById("v_src");
const canvas=document.getElementById("out");
const ctx=canvas.getContext("2d");

const naruto=document.getElementById("n");
const sasuke=document.getElementById("s");

let power=[0,0];
let wasOpen=[false,false];

function isHandOpen(points){

let count=0;
const wrist=points[0];

const tips=[8,12,16,20];
const pips=[6,10,14,18];

for(let i=0;i<tips.length;i++){

const tip=points[tips[i]];
const pip=points[pips[i]];

const tipDist=Math.hypot(tip.x-wrist.x,tip.y-wrist.y);
const pipDist=Math.hypot(pip.x-wrist.x,pip.y-wrist.y);

if(tipDist>pipDist) count++;

}

return count>=3;

}

function onResults(results){

canvas.width=video.videoWidth;
canvas.height=video.videoHeight;

ctx.clearRect(0,0,canvas.width,canvas.height);

naruto.style.display="none";
sasuke.style.display="none";

if(results.multiHandLandmarks){

results.multiHandLandmarks.forEach((landmarks,i)=>{

const label=results.multiHandedness[i].label;
const isRight=label==="Right";
const index=isRight?1:0;

/* draw hand skeleton */

ctx.shadowBlur=10;
ctx.shadowColor="#00f7ff";

drawConnectors(ctx,landmarks,HAND_CONNECTIONS,{
color:"#00d4ff",
lineWidth:3
});

drawLandmarks(ctx,landmarks,{
color:"#ffffff",
radius:2
});

/* detect open hand */

const open=isHandOpen(landmarks);

power[index]+=open?0.05:-0.12;
power[index]=Math.max(0,Math.min(1,power[index]));

/* start animation */

if(open && !wasOpen[index]){

const vid=isRight?sasuke:naruto;

vid.currentTime=0;
vid.muted=true;

vid.play().catch(()=>{});

}

wasOpen[index]=open;

/* position effect */

const wrist=landmarks[0];

if(power[index]>0.05){

const x=(1-wrist.x)*window.innerWidth;
const y=wrist.y*window.innerHeight;

const vid=isRight?sasuke:naruto;

vid.style.left=x+"px";
vid.style.top=y+"px";

vid.style.opacity=power[index];
vid.style.display="block";

}

});

}

}

/* mediapipe setup */

const hands=new Hands({
locateFile:(file)=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
maxNumHands:2,
modelComplexity:1,
minDetectionConfidence:0.7,
minTrackingConfidence:0.7
});

hands.onResults(onResults);

/* start camera */

const camera=new Camera(video,{
onFrame:async()=>{
await hands.send({image:video});
},
width:640,
height:480
});

camera.start();

</script>

</body>
</html>
